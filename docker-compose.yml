services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: viva_backend
    ports:
      - "8000:8000"
    env_file:
      - .env.development
    depends_on:
      - db
    volumes:
      - ./backend:/app

  db:
    image: mysql:8.0
    container_name: viva_db
    ports:
      - "3308:3306"
    env_file:
      - .env.development
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: